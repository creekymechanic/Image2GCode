<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image2Drawing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <div class="bg-dots" aria-hidden="true"></div>

  <header>
    <div class="logo">
      <span class="logo-mark">//</span>
      <span class="logo-text">Image2Drawing</span>
    </div>
    <div class="header-right">
      <div class="printer-pill" id="printer-pill">
        <span class="printer-dot" id="printer-dot"></span>
        <span id="printer-label" class="printer-label">no printer</span>
      </div>
      <button id="btn-dev-toggle" class="dev-toggle" title="Toggle developer mode">⚙</button>
    </div>
  </header>

  <main id="app">

    <!-- ── 01 CAPTURE ─────────────────────────────── -->
    <section id="camera-panel">
      <div class="section-label"><span class="label-num">01</span> capture</div>

      <div id="video-wrap">
        <div class="rec-badge" id="rec-badge">
          <span class="rec-dot-live"></span>LIVE
        </div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="capture-canvas" hidden></canvas>
        <div id="capture-preview" hidden>
          <img id="capture-img" alt="Captured photo">
          <button id="btn-retake" class="btn-ghost">↩ retake</button>
        </div>
      </div>

      <button id="btn-capture" class="btn-capture">
        <span class="btn-icon">◉</span> Capture
      </button>
    </section>

    <!-- ── 02 CONTROLS ────────────────────────────── -->
    <section id="controls-panel">
      <div class="section-label"><span class="label-num">02</span> detail</div>

      <!-- Public detail slider -->
      <div id="detail-control">
        <div class="detail-labels">
          <span>fast</span>
          <span>balanced</span>
          <span>detailed</span>
        </div>
        <input id="detail-slider" type="range" min="1" max="3" value="2" step="1">
      </div>

      <div class="section-label" style="margin-top:8px"><span class="label-num">03</span> run</div>

      <div id="status-bar">
        <span class="status-prompt">›</span>
        <span id="status-text">waiting for camera</span>
        <span class="status-cursor" id="status-cursor">_</span>
      </div>

      <div id="action-buttons">
        <button id="btn-process" class="btn-primary" disabled>→ Process Image</button>
        <button id="btn-print" class="btn-accent" disabled>▶ Send to Printer</button>
      </div>

      <div id="progress-wrap" hidden>
        <div id="progress-track">
          <div id="progress-fill"></div>
        </div>
        <span id="progress-label" class="mono">0%</span>
      </div>

      <!-- ── ADVANCED PANEL ──────────────────────── -->
      <div id="advanced-panel" hidden>
        <div class="divider"><span>dev tools</span></div>

        <div id="stats" hidden>
          <span id="stat-paths" class="stat-chip mono"></span>
          <span id="stat-time"  class="stat-chip mono"></span>
          <span id="stat-lines" class="stat-chip mono"></span>
        </div>

        <div id="gcode-actions" hidden>
          <button id="btn-download"   class="btn-ghost btn-full">↓ Download .gcode</button>
          <button id="btn-copy-gcode" class="btn-ghost btn-full">⎘ Copy G-code</button>
        </div>

        <div class="adv-section-label">contour tuning</div>
        <div class="config-grid">
          <label class="cfg-row">
            <span class="cfg-key">levels</span>
            <input id="cfg-levels"  class="cfg-val mono" type="number" step="1"   min="2"  max="30"  placeholder="8">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">blur</span>
            <input id="cfg-blur"    class="cfg-val mono" type="number" step="2"   min="1"  max="31"  placeholder="9">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">min arc</span>
            <input id="cfg-minarc"  class="cfg-val mono" type="number" step="5"   min="5"  max="200" placeholder="30">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">epsilon</span>
            <input id="cfg-epsilon" class="cfg-val mono" type="number" step="0.5" min="0.5" max="10" placeholder="3.0">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">lev min</span>
            <input id="cfg-levmin"  class="cfg-val mono" type="number" step="5"   min="0"  max="200" placeholder="20">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">lev max</span>
            <input id="cfg-levmax"  class="cfg-val mono" type="number" step="5"   min="55" max="255" placeholder="235">
          </label>
        </div>

        <div class="adv-section-label" style="margin-top:8px">printer config</div>
        <div class="config-grid">
          <label class="cfg-row">
            <span class="cfg-key">port</span>
            <input id="cfg-port"     class="cfg-val mono" type="text"   placeholder="COM3">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">Z draw</span>
            <input id="cfg-zdraw"    class="cfg-val mono" type="number" step="0.1" placeholder="0.0">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">Z travel</span>
            <input id="cfg-ztravel"  class="cfg-val mono" type="number" step="0.5" placeholder="5.0">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">feed draw</span>
            <input id="cfg-fdraw"    class="cfg-val mono" type="number" step="100" placeholder="3000">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">feed travel</span>
            <input id="cfg-ftravel"  class="cfg-val mono" type="number" step="100" placeholder="6000">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">offset X</span>
            <input id="cfg-offx"     class="cfg-val mono" type="number" step="1"   placeholder="25">
          </label>
          <label class="cfg-row">
            <span class="cfg-key">offset Y</span>
            <input id="cfg-offy"     class="cfg-val mono" type="number" step="1"   placeholder="25">
          </label>
          <label class="cfg-row cfg-checkbox">
            <span class="cfg-key">home first</span>
            <input id="cfg-home" type="checkbox">
          </label>
          <label class="cfg-row cfg-checkbox">
            <span class="cfg-key">flip Y</span>
            <input id="cfg-flipy" type="checkbox">
          </label>
        </div>
        <button id="btn-save-config" class="btn-ghost btn-full" style="margin-top:6px">✓ Save config</button>
      </div>

    </section>

    <!-- ── 04 PREVIEW ─────────────────────────────── -->
    <section id="preview-panel">
      <div class="section-label"><span class="label-num">04</span> preview</div>

      <div id="svg-container">
        <div id="svg-placeholder">
          <div class="placeholder-art">
            <div class="ph-line"></div>
            <div class="ph-line short"></div>
            <div class="ph-line"></div>
            <div class="ph-line short"></div>
          </div>
          <p>your drawing appears here</p>
        </div>
      </div>
    </section>

  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
